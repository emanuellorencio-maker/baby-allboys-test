<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#050505" />
  <title>Baby Albo Jump</title>
  <link rel="icon" href="assets/logo.svg" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="game-shell" aria-label="Baby Albo Jump">
    <canvas id="game-canvas" aria-label="Campo de juego"></canvas>

    <section class="screen screen-start" id="start-screen">
      <img src="assets/logo.svg" class="game-logo" alt="Baby Albo Jump" />
      <div class="start-art" aria-hidden="true">
        <img src="assets/jugador.svg" alt="" />
        <img src="assets/pelota.svg" alt="" />
      </div>
      <h1>Baby Albo Jump</h1>
      <p>Salta hasta lo mas alto y hacete leyenda.</p>
      <p class="start-mini">Junta escuditos, arma combo y esquiva rivales.</p>
      <p class="gesture-hint">Desliza para moverte</p>
      <button class="primary-button" id="play-button" type="button">JUGAR</button>
      <a class="back-link" href="../index.html">Volver al sitio</a>
    </section>

    <section class="screen screen-over hidden" id="game-over-screen" aria-live="polite">
      <h2>Game Over</h2>
      <p class="lose-phrase" id="lose-phrase">Una mas y sale</p>
      <div class="game-over-card">
        <div class="score-card">
          <span>Puntaje</span>
          <strong id="final-score">0</strong>
        </div>
        <div class="score-card">
          <span>Record</span>
          <strong id="final-best">0</strong>
        </div>
        <div class="score-card score-card-wide">
          <span>Escuditos juntados</span>
          <strong id="final-coins">0</strong>
        </div>
      </div>
      <button class="primary-button" id="retry-button" type="button">JUGAR DE NUEVO</button>
      <button class="secondary-button" id="share-button" type="button">COMPARTIR RECORD</button>
      <p class="share-fallback hidden" id="share-fallback"></p>
    </section>

    <div class="hud" aria-hidden="true">
      <div class="score-panel">
        <span>Altura</span>
        <strong id="score">0</strong>
        <em>Mejor: <b id="best">0</b></em>
      </div>
      <div class="coins-panel"><span>Escuditos</span><strong id="coins">0</strong></div>
      <div class="combo-panel"><span>Combo</span><strong id="combo">x1</strong></div>
    </div>
    <button class="pause-button hidden" id="pause-button" type="button" aria-label="Pausar juego">II</button>
    <div class="pause-badge hidden" id="pause-badge">PAUSA</div>
  </main>

  <script src="game.js"></script>
</body>
</html>
